<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 260" width="160" height="260">
  <rect width="160" height="260" rx="14" fill="#1a1a2e"/>
  <rect x="6" y="16" width="148" height="228" rx="8" fill="#fff"/>
  <rect x="55" y="16" width="50" height="8" rx="4" fill="#1a1a2e"/>

  <text x="12" y="30" font-size="7" fill="#888" font-family="sans-serif">9:41</text>
  <text x="138" y="30" font-size="7" fill="#888" font-family="sans-serif" text-anchor="end">●●●</text>

  <!-- SBI header -->
  <rect x="6" y="34" width="148" height="22" fill="#e85d04"/>
  <text x="80" y="49" font-size="9" fill="#fff" font-family="sans-serif" text-anchor="middle" font-weight="bold">SBI証券</text>

  <!-- title -->
  <text x="12" y="68" font-size="8" fill="#1a202c" font-family="sans-serif" font-weight="bold">積立設定</text>
  <line x1="12" y1="72" x2="148" y2="72" stroke="#e2e8f0" stroke-width="1"/>

  <!-- fund name -->
  <rect x="12" y="76" width="136" height="28" rx="5" fill="#f0fff4" stroke="#86efac" stroke-width="1"/>
  <text x="80" y="87" font-size="6" fill="#276749" font-family="sans-serif" text-anchor="middle" font-weight="bold">eMAXIS Slim 全世界株式（オール・カントリー）</text>
  <text x="80" y="97" font-size="6" fill="#4a5568" font-family="sans-serif" text-anchor="middle">三菱UFJアセットマネジメント</text>

  <!-- amount setting -->
  <text x="12" y="116" font-size="7" fill="#4a5568" font-family="sans-serif">毎月の積立金額</text>
  <rect x="12" y="120" width="136" height="22" rx="5" fill="#fff" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="100" y="135" font-size="11" fill="#1a202c" font-family="sans-serif" text-anchor="end" font-weight="bold">30,000</text>
  <text x="138" y="135" font-size="8" fill="#4a5568" font-family="sans-serif" text-anchor="end">円</text>

  <!-- payment method -->
  <text x="12" y="155" font-size="7" fill="#4a5568" font-family="sans-serif">支払い方法</text>
  <rect x="12" y="159" width="136" height="22" rx="5" fill="#fff7ed" stroke="#e85d04" stroke-width="1.5"/>
  <rect x="18" y="165" width="18" height="10" rx="2" fill="#006934"/>
  <text x="27" y="173" font-size="5.5" fill="#fff" font-family="sans-serif" text-anchor="middle">OLIVE</text>
  <text x="44" y="173" font-size="7" fill="#e85d04" font-family="sans-serif" font-weight="bold">クレカ積立（OLIVEゴールド）</text>
  <text x="144" y="173" font-size="7" fill="#4a5568" font-family="sans-serif" text-anchor="end">1.0%</text>

  <!-- point preview -->
  <rect x="12" y="186" width="136" height="18" rx="5" fill="#fef9c3"/>
  <text x="80" y="198" font-size="6.5" fill="#854d0e" font-family="sans-serif" text-anchor="middle">毎月獲得予定Vポイント：約 300pt</text>

  <!-- confirm button -->
  <rect x="20" y="210" width="120" height="20" rx="10" fill="#e85d04"/>
  <text x="80" y="223" font-size="8" fill="#fff" font-family="sans-serif" text-anchor="middle" font-weight="bold">この内容で設定する</text>

  <text x="80" y="238" font-size="6" fill="#a0aec0" font-family="sans-serif" text-anchor="middle">※ 画面はイメージです</text>
</svg>
